name: CFP Parse Draft

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: CFP URL to fetch and parse
        required: false
        type: string
      title_hint:
        description: Optional title override
        required: false
        type: string
      raw_text:
        description: Optional pasted CFP text
        required: false
        type: string
      upload_artifact:
        description: Upload parsed draft as an Actions artifact. May contain personal data.
        required: false
        type: boolean
        default: false

jobs:
  parse-cfp-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write raw CFP text
        run: |
          cat > /tmp/cfp_raw_text.txt <<'EOF'
          ${{ inputs.raw_text }}
          EOF

      - name: Parse CFP draft
        run: |
          python scripts/cfp_parse_text.py \
            --url "${{ inputs.source_url }}" \
            --file /tmp/cfp_raw_text.txt \
            --title-hint "${{ inputs.title_hint }}" \
            --output cfp_issue_draft.md

      - name: Write processing audit
        if: always()
        env:
          CONTENT_PERSISTED: ${{ inputs.upload_artifact == true && 'true' || 'false' }}
          STORAGE_MODE: ${{ inputs.upload_artifact == true && 'artifact' || 'ephemeral' }}
        run: |
          python scripts/write_audit_event.py \
            --output "${{ runner.temp }}/cfp_parse_audit.jsonl" \
            --workflow "$GITHUB_WORKFLOW" \
            --event "cfp_parse_draft" \
            --source-type "manual-input" \
            --source-id "${{ github.run_id }}" \
            --storage-mode "$STORAGE_MODE" \
            --content-persisted "$CONTENT_PERSISTED" \
            --category "cfp url or pasted text"

      - name: Upload processing audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfp-parse-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/cfp_parse_audit.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload draft
        if: ${{ inputs.upload_artifact == true }}
        uses: actions/upload-artifact@v4
        with:
          name: cfp_issue_draft
          path: cfp_issue_draft.md
          retention-days: 7
