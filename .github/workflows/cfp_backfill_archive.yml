name: CFP Backfill Archive

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  archive-backfill:
    name: Archive backfilled conference issue
    runs-on: ubuntu-latest

    if: ${{ github.event.issue.pull_request == null && (contains(github.event.issue.labels.*.name, 'backfill') || startsWith(github.event.issue.title, '[BACKFILL]') || contains(github.event.issue.body, 'Presentation title')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Archive backfill issue
        run: python scripts/cfp_backfill_archive.py

      - name: Commit generated CFP ledger files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cfp/

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Archive backfilled conference issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Comment on issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/cfp_backfill_comment.md ]; then
            gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/cfp_backfill_comment.md
          else
            echo "No comment file generated."
          fi

      - name: Close issue as completed
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "${{ github.event.issue.number }}" --reason completed
