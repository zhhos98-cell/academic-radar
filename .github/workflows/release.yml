name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload Python distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller
      - name: Build executable
        run: |
          python -m PyInstaller --onefile --windowed --name AcademicRadar academic_radar_gui.py
      - name: Create Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\AcademicRadar-Windows | Out-Null
          Copy-Item dist\AcademicRadar.exe dist\AcademicRadar-Windows\AcademicRadar.exe
          @"
          Academic Radar for Windows
          ==========================

          1. Double-click AcademicRadar.exe.
          2. Fill the form or keep the defaults.
          3. Choose a workspace folder.
          4. Click Save files, Summary, Doctor, or Dry run.
          5. Dry run writes an HTML preview under the workspace tmp folder and opens it in your browser.

          The app writes runtime files under your chosen local workspace. Do not copy private watchlists, OPML exports, state files, or delivery settings into a public repository unless you intentionally want them public.
          "@ | Set-Content -Encoding UTF8 dist\AcademicRadar-Windows\README.txt
          Compress-Archive -Path dist\AcademicRadar-Windows\* -DestinationPath dist\AcademicRadar-Windows.zip -Force
      - name: Upload Windows distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcademicRadar-Windows
          path: dist/AcademicRadar-Windows.zip

  publish:
    needs:
      - build-python
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="$INPUT_TAG"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required."
            exit 1
          fi

          mkdir -p flattened-assets
          find release-assets -type f -maxdepth 3 -print -exec cp {} flattened-assets/ \;

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" flattened-assets/* --clobber
          else
            gh release create "$TAG" flattened-assets/* \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file docs/RELEASE.md
          fi
