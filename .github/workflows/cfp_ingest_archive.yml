name: CFP Ingest Archive

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  ingest-cfp:
    name: Ingest CFP issue into ledger
    runs-on: ubuntu-latest

    if: ${{ github.event.issue.pull_request == null && !contains(github.event.issue.labels.*.name, 'backfill') && (contains(github.event.issue.labels.*.name, 'cfp') || startsWith(github.event.issue.title, '[CFP]') || contains(github.event.issue.body, 'CFP title')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ingest CFP issue
        run: python scripts/cfp_ingest_archive.py

      - name: Commit generated CFP ledger files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cfp/

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Ingest CFP issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Comment on issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/cfp_ingest_comment.md ]; then
            gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/cfp_ingest_comment.md
          else
            echo "No comment file generated."
          fi
