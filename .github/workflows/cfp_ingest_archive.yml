name: CFP Ingest Archive

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - reopened

permissions:
  contents: write
  issues: write

jobs:
  ingest-cfp:
    name: Ingest CFP issue into ledger
    runs-on: ubuntu-latest

    if: ${{ github.event.issue.pull_request == null && !contains(github.event.issue.labels.*.name, 'backfill') && (contains(github.event.issue.labels.*.name, 'cfp') || startsWith(github.event.issue.title, '[CFP]') || contains(github.event.issue.body, 'CFP title')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ingest CFP issue
        run: python scripts/cfp_ingest_archive.py
        env:
          CFP_INGEST_COMMENT_PATH: ${{ runner.temp }}/cfp_ingest_comment.md
          PERSIST_CFP_LEDGER: ${{ vars.PERSIST_CFP_LEDGER }}

      - name: Write processing audit
        if: always()
        env:
          STORAGE_MODE: ${{ vars.PERSIST_CFP_LEDGER == 'true' && 'repository' || 'ephemeral' }}
          CONTENT_PERSISTED: ${{ vars.PERSIST_CFP_LEDGER == 'true' && 'true' || 'false' }}
        run: |
          python scripts/write_audit_event.py \
            --output "${{ runner.temp }}/cfp_ingest_audit.jsonl" \
            --workflow "$GITHUB_WORKFLOW" \
            --event "cfp_ingest" \
            --source-type "issue" \
            --source-id "${{ github.event.issue.number }}" \
            --storage-mode "$STORAGE_MODE" \
            --content-persisted "$CONTENT_PERSISTED" \
            --category "issue form metadata" \
            --category "cfp tracking fields"

      - name: Upload processing audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfp-ingest-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/cfp_ingest_audit.jsonl
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit generated CFP ledger files
        if: ${{ vars.PERSIST_CFP_LEDGER == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cfp/

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Ingest CFP issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Comment on issue
        if: ${{ success() && vars.COMMENT_CFP_ISSUES == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          CFP_INGEST_COMMENT_PATH: ${{ runner.temp }}/cfp_ingest_comment.md
        run: |
          if [ -f "$CFP_INGEST_COMMENT_PATH" ]; then
            gh issue comment "${{ github.event.issue.number }}" --body-file "$CFP_INGEST_COMMENT_PATH"
          else
            echo "No comment file generated."
          fi
