name: Daily Academic Radar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run radar
        env:
          RADAR_CONFIG: config/profiles/hps.json
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ] || [ -z "$TO_EMAIL" ]; then
            python radar.py \
              --config "$RADAR_CONFIG" \
              --output-html radar_digest.html \
              --output-json radar_items.json \
              --no-email
          else
            python radar.py \
              --config "$RADAR_CONFIG" \
              --output-html radar_digest.html \
              --output-json radar_items.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: radar-digest
          path: |
            radar_digest.html
            radar_items.json

      - name: Commit sent item state
        if: ${{ vars.COMMIT_RADAR_STATE == 'true' }}
        run: |
          git config user.name "academic-radar-bot"
          git config user.email "academic-radar-bot@users.noreply.github.com"
          git add -f sent_items.json
          git diff --cached --quiet || git commit -m "Update sent item state"
          git push
