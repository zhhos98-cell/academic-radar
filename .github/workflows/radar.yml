name: Export Bluesky Follows

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python export_bsky_follows.py

      - uses: actions/upload-artifact@v4
        with:
          name: bsky_accounts
          path: bsky_accounts.txt
