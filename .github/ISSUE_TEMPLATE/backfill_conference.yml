name: Backfill conference / 补档会议
description: Archive a past conference presentation with links, abstract, bio, and ORCID-ready metadata.
title: "[BACKFILL] "
labels: ["cfp-ledger", "backfill", "completed"]
body:
  - type: markdown
    attributes:
      value: |
        用这个表单补档已经完成的会议、报告、panel、workshop、seminar。
        先只存链接和文本，不上传文件。后面可以自动归档 abstract/bio、计算 hash、生成 CV / ORCID-ready 导出。

  - type: input
    id: presentation_title
    attributes:
      label: Presentation title / 论文题目
      placeholder: "Title of the paper or presentation"
    validations:
      required: true

  - type: input
    id: conference_title
    attributes:
      label: Conference title / 会议名称
      placeholder: "Conference, workshop, panel, seminar, etc."
    validations:
      required: true

  - type: input
    id: conference_website
    attributes:
      label: Conference website / 会议网站
      placeholder: "https://..."
    validations:
      required: false

  - type: input
    id: programme_url
    attributes:
      label: Programme URL / 会议日程链接
      placeholder: "https://..."
    validations:
      required: false

  - type: input
    id: proceedings_url
    attributes:
      label: Proceedings / abstract book URL / 论文集或摘要集链接
      placeholder: "https://..."
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Location / 地点
      placeholder: "Cambridge, UK / Online / Hybrid"
    validations:
      required: false

  - type: input
    id: host_institution
    attributes:
      label: Host institution / 主办或承办机构
      placeholder: "University / Society / Department"
    validations:
      required: false

  - type: input
    id: event_dates
    attributes:
      label: Event dates / 会议日期
      placeholder: "2026-06-18 to 2026-06-19"
    validations:
      required: false

  - type: input
    id: presentation_date
    attributes:
      label: Presentation date / 报告日期
      placeholder: "2026-06-18"
    validations:
      required: false

  - type: dropdown
    id: role
    attributes:
      label: Role / 角色
      options:
        - paper presenter
        - invited speaker
        - panelist
        - chair
        - respondent
        - organizer
        - poster presenter
        - other
    validations:
      required: false

  - type: dropdown
    id: project_link
    attributes:
      label: Project link / 对应项目
      options:
        - unknown
        - Mudge / Board of Longitude
        - Huizinga / Malinowski
        - Coleridge / Wedgwood
        - Photography / tacit knowledge
        - Mary Toft / reproductive politics
        - Balfour / China / religion
        - Black Studies radar
        - other
    validations:
      required: false

  - type: textarea
    id: abstract
    attributes:
      label: Abstract text / 摘要文本
      description: Paste the submitted or presented abstract here. No file upload needed.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: bio
    attributes:
      label: Bio text / 投稿或会议 bio
      description: Paste the bio used for this conference, if any.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes / 备注
      description: Funding, travel, panel title, chair, publication status, acceptance email link, etc.
      render: markdown
    validations:
      required: false

  - type: checkboxes
    id: exports
    attributes:
      label: Export options / 导出选项
      options:
        - label: Include in CV conference list / 加入 CV 会议列表
        - label: Include in ORCID-ready export / 加入 ORCID-ready 导出
        - label: Include abstract in local archive / 归档 abstract 全文
