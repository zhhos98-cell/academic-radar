name: Backfill conference / 补档会议
description: Archive a past conference presentation with links, abstract, bio, and ORCID-ready metadata.
title: "[BACKFILL] "
labels:

* backfill
* cfp-ledger
* completed

body:

* type: markdown
  attributes:
  value: |
  用这个表单补档已经完成的会议、报告、panel、workshop、seminar。

  ```
  这一入口只保存链接和文本，不上传文件。提交后，GitHub Actions 会把记录归档到 `cfp/backfill/`，生成 `metadata.yml`、`metadata.json`、`abstract.txt`、`bio.txt`、`SHA256SUMS.txt`，并更新 `cfp/README.md`、CV export 和 ORCID-ready export。
  ```

* type: input
  id: presentation_title
  attributes:
  label: Presentation title / 论文题目
  description: The title of your paper, presentation, poster, or talk.
  placeholder: "Weighing the Koh-i-Noor: Story-Maskelyne, Valentine Ball, and Diamond Chronology in Late Victorian Britain"
  validations:
  required: true

* type: input
  id: conference_title
  attributes:
  label: Conference title / 会议名称
  description: Conference, symposium, workshop, seminar, invited lecture series, etc.
  placeholder: "Journal of the History of Ideas Graduate Student Symposium"
  validations:
  required: true

* type: input
  id: panel_title
  attributes:
  label: Panel title / Panel 名称
  description: Optional. Use this for panel, session, roundtable, or stream title.
  placeholder: "Knowledge Beyond the Text"
  validations:
  required: false

* type: input
  id: conference_website
  attributes:
  label: Conference website / 会议网站
  description: Main conference or event page.
  placeholder: "https://..."
  validations:
  required: false

* type: input
  id: programme_url
  attributes:
  label: Programme URL / 会议日程链接
  description: Programme, schedule, registration page, blog announcement, or public event listing.
  placeholder: "https://..."
  validations:
  required: false

* type: input
  id: proceedings_url
  attributes:
  label: Proceedings / abstract book URL / 论文集或摘要集链接
  description: Proceedings, abstract book, published programme PDF, conference booklet, or permanent announcement page.
  placeholder: "https://..."
  validations:
  required: false

* type: input
  id: location
  attributes:
  label: Location / 地点
  description: City and country, or Online / Hybrid.
  placeholder: "Online / Cambridge, UK / Philadelphia, PA, USA"
  validations:
  required: false

* type: input
  id: host_institution
  attributes:
  label: Host institution / 主办或承办机构
  description: University, department, society, journal, research centre, or host institution.
  placeholder: "Journal of the History of Ideas / University / Society / Department"
  validations:
  required: false

* type: input
  id: event_dates
  attributes:
  label: Event dates / 会议日期
  description: Use YYYY-MM-DD, YYYY-MM, or a date range if possible.
  placeholder: "2025-10 / 2026-06-18 to 2026-06-19"
  validations:
  required: false

* type: input
  id: presentation_date
  attributes:
  label: Presentation date / 报告日期
  description: Use YYYY-MM-DD if known. Leave blank if only the month or event dates are known.
  placeholder: "2026-06-18"
  validations:
  required: false

* type: dropdown
  id: role
  attributes:
  label: Role / 角色
  description: Your role in this event.
  options:
  - paper presenter
  - invited speaker
  - panelist
  - chair
  - respondent
  - organizer
  - poster presenter
  - seminar speaker
  - workshop participant
  - other
  default: 0
  validations:
  required: false

* type: dropdown
  id: project_link
  attributes:
  label: Project link / 对应项目
  description: Internal project tag for your own tracking.
  options:
  - unknown
  - Mudge / Board of Longitude
  - Huizinga / Malinowski
  - Coleridge / Wedgwood
  - Photography / tacit knowledge
  - Mary Toft / reproductive politics
  - Balfour / China / religion
  - Black Studies radar
  - Book review / review essay
  - General HPS / history of science
  - other
  default: 0
  validations:
  required: false

* type: textarea
  id: abstract
  attributes:
  label: Abstract text / 摘要文本
  description: Paste the submitted or presented abstract. No file upload needed.
  placeholder: "Paste abstract here."
  render: markdown
  validations:
  required: false

* type: textarea
  id: bio
  attributes:
  label: Bio text / 投稿或会议 bio
  description: Paste the bio used for this conference, if any.
  placeholder: "Paste bio here."
  render: markdown
  validations:
  required: false

* type: textarea
  id: citation_note
  attributes:
  label: Citation note / CV 引用备注
  description: Optional. Add preferred CV wording, citation style, panel/chair detail, or publication note.
  placeholder: "Preferred CV wording, chair, panel, funding, acceptance note, recording link, etc."
  render: markdown
  validations:
  required: false

* type: textarea
  id: notes
  attributes:
  label: Notes / 备注
  description: Internal notes. Use for funding, travel, acceptance email link, recording, publication status, or uncertainty.
  placeholder: "Private/internal notes."
  render: markdown
  validations:
  required: false

* type: checkboxes
  id: exports
  attributes:
  label: Export options / 导出选项
  description: Choose where this backfilled record should appear.
  options:
  - label: Include in CV conference list / 加入 CV 会议列表
  required: false
  - label: Include in ORCID-ready export / 加入 ORCID-ready 导出
  required: false
  - label: Include abstract in local archive / 归档 abstract 全文
  required: false
